<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TTS Test</title></head>
<body>
<h2>TTS Engine Test</h2>
<p id="status">Click a button to test</p>
<br>
<button onclick="test1()">Test 1: Web Speech API (Tamil)</button><br><br>
<button onclick="test2()">Test 2: Web Speech API (English)</button><br><br>
<button onclick="test3()">Test 3: Google TTS Direct</button><br><br>
<button onclick="test4()">Test 4: AllOrigins Proxy</button><br><br>
<button onclick="test5()">Test 5: List all voices</button>
<pre id="log"></pre>

<script>
function log(msg){ document.getElementById('log').textContent += msg + '\n'; document.getElementById('status').textContent = msg; }

function test1(){
  log('Testing Web Speech API Tamil...');
  if(!window.speechSynthesis){ log('FAIL: speechSynthesis not supported'); return; }
  var voices = window.speechSynthesis.getVoices();
  var ta = voices.find(v => v.lang.startsWith('ta'));
  if(!ta){ log('No Tamil voice found. Available langs: ' + [...new Set(voices.map(v=>v.lang))].join(', ')); }
  else { log('Tamil voice found: ' + ta.name + ' | ' + ta.lang); }
  var u = new SpeechSynthesisUtterance('வணக்கம். இது ஒரு சோதனை.');
  if(ta) u.voice = ta;
  u.lang = 'ta-IN';
  u.onstart = ()=>log('Web Speech Tamil: STARTED');
  u.onend = ()=>log('Web Speech Tamil: ENDED OK');
  u.onerror = (e)=>log('Web Speech Tamil: ERROR = ' + e.error);
  window.speechSynthesis.speak(u);
}

function test2(){
  log('Testing Web Speech API English...');
  var u = new SpeechSynthesisUtterance('Hello, this is a test of the English voice.');
  u.lang = 'en-IN';
  u.onstart = ()=>log('Web Speech English: STARTED');
  u.onend = ()=>log('Web Speech English: ENDED OK');
  u.onerror = (e)=>log('Web Speech English: ERROR = ' + e.error);
  window.speechSynthesis.speak(u);
}

function test3(){
  log('Testing Google TTS Direct...');
  var url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ta&q=' + encodeURIComponent('வணக்கம்');
  var a = new Audio(url);
  a.onplay = ()=>log('Google TTS Direct: PLAYING');
  a.onended = ()=>log('Google TTS Direct: ENDED OK');
  a.onerror = (e)=>log('Google TTS Direct: ERROR = ' + e.type + ' code=' + (a.error&&a.error.code));
  a.play().catch(e=>log('Google TTS Direct: PLAY REJECTED = ' + e.message));
}

function test4(){
  log('Testing AllOrigins Proxy...');
  var direct = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ta&q=' + encodeURIComponent('வணக்கம்');
  var url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(direct);
  var a = new Audio(url);
  a.onplay = ()=>log('AllOrigins Proxy: PLAYING');
  a.onended = ()=>log('AllOrigins Proxy: ENDED OK');
  a.onerror = (e)=>log('AllOrigins Proxy: ERROR = ' + e.type);
  a.play().catch(e=>log('AllOrigins Proxy: PLAY REJECTED = ' + e.message));
}

function test5(){
  var voices = window.speechSynthesis.getVoices();
  log('Total voices: ' + voices.length);
  voices.forEach(v => log(v.lang + ' | ' + v.name + ' | local=' + v.localService));
}

// Auto-load voices
window.speechSynthesis.onvoiceschanged = function(){ log('Voices loaded: ' + window.speechSynthesis.getVoices().length); }
</script>
</body>
</html>
