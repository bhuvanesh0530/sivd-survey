<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TTS Test 2</title>
<style>
body{font-family:Arial;padding:30px;max-width:500px;margin:0 auto}
button{display:block;width:100%;padding:15px;margin:10px 0;font-size:16px;cursor:pointer;border-radius:8px;border:none;color:white;background:#1565C0}
#result{padding:15px;background:#f5f5f5;border-radius:8px;margin-top:20px;font-size:13px;min-height:60px}
</style>
</head>
<body>
<h2>🔊 Tamil TTS Test</h2>

<button onclick="test1()">Test 1: Google TTS direct &lt;audio&gt; tag</button>
<button onclick="test2()">Test 2: Google TTS fetch→blob</button>
<button onclick="test3()">Test 3: MyMemory TTS API</button>
<button onclick="test4()">Test 4: VoiceRSS API</button>

<div id="result">Click a button...</div>

<script>
var log=document.getElementById('result');
function add(m){log.innerHTML+='<br>'+m;}

var TEXT='வணக்கம். உங்கள் கிராமத்தின் பெயர் என்ன?';

function test1(){
  log.innerHTML='Test 1: Google direct audio...';
  var url='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(TEXT)+'&tl=ta&client=tw-ob&ttsspeed=0.9';
  var a=new Audio(url);
  a.onplay=function(){add('✅ PLAYING');}
  a.onended=function(){add('✅ ENDED');}
  a.onerror=function(e){add('❌ ERROR: '+e.type+' code:'+a.error?.code);}
  a.play().then(function(){add('play() resolved')}).catch(function(e){add('❌ play() rejected: '+e.message);});
}

function test2(){
  log.innerHTML='Test 2: fetch→blob...';
  var url='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(TEXT)+'&tl=ta&client=tw-ob&ttsspeed=0.9';
  fetch(url,{mode:'cors'})
    .then(function(r){add('fetch status:'+r.status);return r.blob();})
    .then(function(b){
      add('blob size:'+b.size);
      var burl=URL.createObjectURL(b);
      var a=new Audio(burl);
      a.onplay=function(){add('✅ PLAYING');}
      a.onended=function(){add('✅ ENDED');}
      a.onerror=function(){add('❌ audio error');}
      a.play().catch(function(e){add('❌ '+e.message);});
    })
    .catch(function(e){add('❌ fetch failed: '+e.message);});
}

function test3(){
  log.innerHTML='Test 3: MyMemory API...';
  var url='https://api.mymemory.translated.net/api/tts?q='+encodeURIComponent('வணக்கம்')+'&lang=ta-IN';
  var a=new Audio(url);
  a.onplay=function(){add('✅ PLAYING');}
  a.onended=function(){add('✅ ENDED');}
  a.onerror=function(){add('❌ ERROR');}
  a.play().catch(function(e){add('❌ '+e.message);});
}

function test4(){
  log.innerHTML='Test 4: VoiceRSS...';
  var url='https://api.voicerss.org/?key=bc75f14e4f2f42ada91bb93ba12fb8b6&hl=ta-in&src='+encodeURIComponent('வணக்கம்')+'&c=MP3&f=16khz_16bit_stereo';
  var a=new Audio(url);
  a.onplay=function(){add('✅ PLAYING');}
  a.onended=function(){add('✅ ENDED');}
  a.onerror=function(){add('❌ ERROR');}
  a.play().catch(function(e){add('❌ '+e.message);});
}
</script>
</body>
</html>
