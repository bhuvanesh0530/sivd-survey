<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TTS Diagnostic</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;padding:20px;background:#f0f4ff}
button{padding:12px 20px;margin:8px;border:none;border-radius:8px;font-size:15px;cursor:pointer}
.test-btn{background:#1565C0;color:white;width:100%}
.result{padding:10px;margin:6px 0;border-radius:8px;font-size:13px;font-family:monospace}
.ok{background:#d4edda;color:#155724}
.fail{background:#f8d7da;color:#721c24}
.info{background:#d1ecf1;color:#0c5460}
.warn{background:#fff3cd;color:#856404}
h3{color:#1565C0;margin-top:16px}
</style>
</head>
<body>
<h2>🔧 Tamil TTS Diagnostic Tool</h2>
<p style="font-size:13px;color:#666">This tool shows exactly WHY Tamil audio is not working on your device.</p>

<h3>Step 1: Check Speech Synthesis Support</h3>
<div id="support-result"></div>

<h3>Step 2: Load & List All Voices</h3>
<button class="test-btn" onclick="listVoices()">🔍 Show All Available Voices</button>
<div id="voices-result"></div>

<h3>Step 3: Test Tamil Speech</h3>
<button class="test-btn" onclick="testTamil()">🔊 Test Tamil: "வணக்கம்"</button>
<button class="test-btn" onclick="testEnglish()">🔊 Test English: "Hello"</button>
<div id="speech-result"></div>

<h3>Step 4: Tamil Voice Install Instructions</h3>
<div id="install-instructions"></div>

<script>
var log = function(containerId, msg, type) {
  var d = document.getElementById(containerId);
  var div = document.createElement('div');
  div.className = 'result ' + (type||'info');
  div.textContent = msg;
  d.appendChild(div);
};

// Step 1: Check support
(function(){
  if (!('speechSynthesis' in window)) {
    log('support-result','❌ Web Speech API NOT supported in this browser. Use Chrome or Samsung Internet.','fail');
  } else {
    log('support-result','✅ Web Speech API is supported','ok');
  }
  log('support-result','Browser: ' + navigator.userAgent.substring(0,80),'info');
  log('support-result','Protocol: ' + location.protocol + ' (must be https for speech to work)','info');
})();

function listVoices() {
  var d = document.getElementById('voices-result');
  d.innerHTML = '';
  
  function showVoices() {
    var voices = window.speechSynthesis.getVoices();
    if (voices.length === 0) {
      log('voices-result','⚠️ No voices loaded yet. Wait 2 seconds and try again.','warn');
      return;
    }
    log('voices-result','Total voices: ' + voices.length,'info');
    
    var tamilVoices = voices.filter(function(v){ return v.lang.startsWith('ta') || v.name.toLowerCase().indexOf('tamil') >= 0; });
    var indianVoices = voices.filter(function(v){ return v.lang.indexOf('IN') >= 0 || v.lang.indexOf('in') >= 0; });
    
    if (tamilVoices.length > 0) {
      log('voices-result','✅ TAMIL VOICES FOUND: ' + tamilVoices.length,'ok');
      tamilVoices.forEach(function(v){ log('voices-result','  → ' + v.name + ' | ' + v.lang + ' | ' + (v.localService?'LOCAL':'ONLINE'),'ok'); });
    } else {
      log('voices-result','❌ NO TAMIL VOICES FOUND on this device','fail');
      log('voices-result','This is WHY Tamil audio does not work','fail');
    }
    
    if (indianVoices.length > 0) {
      log('voices-result','Indian voices available: ' + indianVoices.map(function(v){return v.name+' ('+v.lang+')'}).join(', '),'info');
    }
    
    log('voices-result','All voices: ' + voices.map(function(v){return v.lang}).join(', '),'info');
  }
  
  showVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = function(){ showVoices(); };
  }
  setTimeout(showVoices, 1000);
  setTimeout(showVoices, 3000);
}

function testTamil() {
  var d = document.getElementById('speech-result');
  d.innerHTML = '';
  window.speechSynthesis.cancel();
  
  var u = new SpeechSynthesisUtterance('வணக்கம். நான் பேசுகிறேன். இது தமிழ் மொழி சோதனை.');
  u.lang = 'ta-IN';
  u.rate = 0.8;
  u.volume = 1;
  
  var voices = window.speechSynthesis.getVoices();
  var tv = voices.find(function(v){ return v.lang.startsWith('ta'); });
  if (tv) { u.voice = tv; log('speech-result','Using voice: ' + tv.name,'info'); }
  else { log('speech-result','⚠️ No Tamil voice found - using default (may not pronounce Tamil correctly)','warn'); }
  
  u.onstart = function(){ log('speech-result','✅ Audio STARTED playing','ok'); };
  u.onend   = function(){ log('speech-result','✅ Audio finished','ok'); };
  u.onerror = function(e){ log('speech-result','❌ Error: ' + e.error + ' - ' + (e.message||''),'fail'); };
  
  window.speechSynthesis.speak(u);
  log('speech-result','Attempting to speak Tamil...','info');
}

function testEnglish() {
  var d = document.getElementById('speech-result');
  d.innerHTML = '';
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance('Hello. This is an English test. Can you hear me?');
  u.lang = 'en-IN';
  u.rate = 0.9;
  u.onstart = function(){ log('speech-result','✅ English audio STARTED','ok'); };
  u.onend   = function(){ log('speech-result','✅ English audio finished','ok'); };
  u.onerror = function(e){ log('speech-result','❌ English error: ' + e.error,'fail'); };
  window.speechSynthesis.speak(u);
}

// Auto-run after load
window.addEventListener('load', function(){
  setTimeout(function(){
    var voices = window.speechSynthesis.getVoices();
    var d = document.getElementById('install-instructions');
    if (!d) return;
    
    var hasAndroid = /android/i.test(navigator.userAgent);
    var hasIOS = /iphone|ipad/i.test(navigator.userAgent);
    
    if (hasAndroid) {
      d.innerHTML = '<div class="result info"><strong>📱 Android Instructions to add Tamil voice:</strong><br><br>' +
        '1. Open phone Settings<br>' +
        '2. Go to: General Management → Language & Input<br>' +
        '3. Tap: Text-to-Speech (TTS)<br>' +
        '4. Tap: Google Text-to-Speech Engine<br>' +
        '5. Tap: Install voice data<br>' +
        '6. Find Tamil → Download<br>' +
        '7. Come back and test again</div>';
    } else if (hasIOS) {
      d.innerHTML = '<div class="result info"><strong>🍎 iPhone/iPad Instructions:</strong><br><br>' +
        '1. Open Settings<br>' +
        '2. Go to: Accessibility → Spoken Content<br>' +
        '3. Tap: Voices<br>' +
        '4. Tap: Tamil<br>' +
        '5. Download a Tamil voice<br>' +
        '6. Come back and test again</div>';
    } else {
      d.innerHTML = '<div class="result info"><strong>💻 Desktop (Chrome/Edge):</strong><br><br>' +
        'Go to Windows Settings → Time & Language → Speech<br>' +
        'Or on Mac: System Preferences → Accessibility → Speech<br>' +
        'Add Tamil as a language with TTS support</div>';
    }
  }, 500);
});
</script>
</body>
</html>
