<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TTS Test</title>
<style>
body{font-family:Arial;padding:30px;max-width:500px;margin:0 auto}
button{display:block;width:100%;padding:15px;margin:10px 0;font-size:16px;cursor:pointer;border-radius:8px;border:none;color:white}
.r{background:#e53935}.g{background:#2e7d32}.b{background:#1565C0}
#result{padding:15px;background:#f5f5f5;border-radius:8px;margin-top:20px;font-size:14px;min-height:50px}
</style>
</head>
<body>
<h2>🔊 TTS Test — Click each button</h2>
<p>Tell me which buttons actually play audio:</p>

<button class="b" onclick="test1()">Test 1: Web Speech API - Tamil</button>
<button class="b" onclick="test2()">Test 2: Web Speech API - English</button>
<button class="g" onclick="test3()">Test 3: ResponsiveVoice - Tamil Female</button>
<button class="g" onclick="test4()">Test 4: ResponsiveVoice - UK English Female</button>
<button class="r" onclick="stopAll()">⏹ STOP ALL</button>

<div id="result">Results will appear here...</div>

<script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
<script>
var log = document.getElementById('result');
function add(msg){ log.innerHTML += '<br>'+msg; console.log(msg); }

function test1(){
  log.innerHTML = 'Test 1 started...';
  if(!window.speechSynthesis){ add('❌ speechSynthesis NOT supported'); return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance('வணக்கம். உங்கள் பெயர் என்ன?');
  u.lang = 'ta-IN'; u.rate = 0.9;
  u.onstart = function(){ add('✅ Test 1 PLAYING'); }
  u.onend = function(){ add('✅ Test 1 ENDED'); }
  u.onerror = function(e){ add('❌ Test 1 ERROR: '+e.error); }
  window.speechSynthesis.speak(u);
}

function test2(){
  log.innerHTML = 'Test 2 started...';
  if(!window.speechSynthesis){ add('❌ NOT supported'); return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance('Hello. What is your name?');
  u.lang = 'en-IN'; u.rate = 0.9;
  u.onstart = function(){ add('✅ Test 2 PLAYING'); }
  u.onend = function(){ add('✅ Test 2 ENDED'); }
  u.onerror = function(e){ add('❌ Test 2 ERROR: '+e.error); }
  window.speechSynthesis.speak(u);
}

function test3(){
  log.innerHTML = 'Test 3 started...';
  if(typeof responsiveVoice === 'undefined'){ add('❌ ResponsiveVoice NOT loaded'); return; }
  add('ResponsiveVoice loaded: '+responsiveVoice.voiceSupport());
  responsiveVoice.speak('வணக்கம். உங்கள் கிராமத்தின் பெயர் என்ன?', 'Tamil Female', {
    rate: 0.9,
    onstart: function(){ add('✅ Test 3 PLAYING - Tamil Female'); },
    onend: function(){ add('✅ Test 3 ENDED'); },
    onerror: function(){ add('❌ Test 3 ERROR'); }
  });
}

function test4(){
  log.innerHTML = 'Test 4 started...';
  if(typeof responsiveVoice === 'undefined'){ add('❌ ResponsiveVoice NOT loaded'); return; }
  responsiveVoice.speak('Hello. What is your village name?', 'UK English Female', {
    rate: 0.9,
    onstart: function(){ add('✅ Test 4 PLAYING - UK English Female'); },
    onend: function(){ add('✅ Test 4 ENDED'); },
    onerror: function(){ add('❌ Test 4 ERROR'); }
  });
}

function stopAll(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  if(typeof responsiveVoice !== 'undefined') responsiveVoice.cancel();
  add('⏹ Stopped all');
}

window.onload = function(){
  var voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  add('Browser voices count: '+voices.length);
  add('Tamil voices: '+voices.filter(function(v){return v.lang.includes('ta')}).map(function(v){return v.name}).join(', ')||'none');
  add('ResponsiveVoice: '+(typeof responsiveVoice !== 'undefined' ? 'LOADED ✅' : 'NOT loaded ❌'));
}
</script>
</body>
</html>
